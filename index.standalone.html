<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Rhythm Guard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: #0d0618;
        font-family: Arial, sans-serif;
        touch-action: none;
        -webkit-touch-callout: none;
        user-select: none;
      }
      #game-container {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto;
      }
      canvas { display: block; touch-action: none; }
      #loading {
        position: fixed; inset: 0; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        background: #0d0618; color: #7b4fff; z-index: 9999;
      }
      #loading.hidden { display: none; }
      #loading p { margin-top: 12px; color: #aaa; font-size: 14px; }
    </style>
  </head>
  <body>
    <div id="loading">
      <div style="font-size:28px;font-weight:bold;">Rhythm Guard</div>
      <p>WebGL 加载中…</p>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => document.getElementById('loading')?.classList.add('hidden'), 800);
      });
    </script>
  </body>
</html>
